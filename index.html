<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>古兰经 — 中文译文</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-arabic">القرآن الكريم</span>
        <span class="logo-zh">古兰经 · 中文</span>
      </div>
      <div class="header-controls">
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="搜索章节名称…" autocomplete="off" />
          <button id="searchClear" class="btn-icon" title="清除搜索" hidden>✕</button>
        </div>
        <button id="themeToggle" class="btn-icon" title="切换深色/浅色模式">🌙</button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main>
    <!-- Surah list view -->
    <section id="surahListView" class="view active">
      <div class="container">
        <div class="page-intro">
          <h1>章节列表</h1>
          <p>古兰经共 114 章，点击任意章节即可阅读阿拉伯原文及中文译文。</p>
        </div>
        <div id="surahGrid" class="surah-grid" role="list" aria-label="章节列表">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>正在加载章节列表…</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Verse detail view -->
    <section id="verseView" class="view">
      <div class="container">
        <!-- Surah header -->
        <div id="surahHeader" class="surah-header">
          <button id="backBtn" class="back-btn">← 返回章节列表</button>
          <div class="surah-title-block">
            <div id="surahNameArabic" class="surah-name-arabic"></div>
            <div class="surah-meta">
              <span id="surahNameZh" class="surah-name-zh"></span>
              <span id="surahMeta" class="surah-meta-info"></span>
            </div>
          </div>
          <div id="bismillah" class="bismillah">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>
        </div>

        <!-- Verse controls -->
        <div class="verse-controls">
          <label for="fontSizeSlider" class="font-label">字体大小</label>
          <input id="fontSizeSlider" type="range" min="14" max="36" value="24" step="1" />
          <span id="fontSizeVal">24px</span>
        </div>

        <!-- Verses container -->
        <div id="versesContainer" class="verses-container">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>正在加载经文…</p>
          </div>
        </div>

        <!-- Pagination -->
        <nav id="pagination" class="pagination" aria-label="翻页" hidden></nav>
      </div>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>经文数据来源：<a href="https://quran.com" target="_blank" rel="noopener">Quran.com API v4</a> · 中文译文：马坚（Ma Jian）</p>
  </footer>

  <!-- ===== ERROR TOAST ===== -->
  <div id="errorToast" class="error-toast" hidden role="alert"></div>

  <script src="js/app.js"></script>
</body>
</html>
